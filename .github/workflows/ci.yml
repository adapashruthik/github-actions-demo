name: GitHub Actions Level 3

on:
  push:
    branches:
      - main

env:
  APP_NAME: "GitHub Actions Demo"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: |
          npm install

      - name: Display App Name
        run: |
          echo "Application Name: $APP_NAME"

      - name: Display Node Version
        run: |
          node -v

      - name: Display npm Version
        run: |
          npm -v

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: |
          npm install

      - name: Run Tests
        run: |
          npm test

      - name: Run Application
        run: |
          npm start